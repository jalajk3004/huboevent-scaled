name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Fix permissions
            sudo chown -R ubuntu:ubuntu /home/ubuntu/hubo

            # Pull latest code
            cd /home/ubuntu/hubo
            git pull origin main

            # Install ALL dependencies including devDeps
            cd server
            npm install

            # Build TypeScript
            npm run build

            # Restart PM2
            pm2 delete hubo-events-api || true
            npm run pm2:start
            pm2 save

            echo "✅ Deployment complete"
